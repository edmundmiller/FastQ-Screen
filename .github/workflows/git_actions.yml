name: nf-test CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Enable debug logging'
        required: false
        default: 'false'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        NXF_VER:
          - "23.04.0"
          - "latest-stable"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Debug information
        run: |
          echo "🚀 GitHub Actions is working!"
          echo "Runner OS: $RUNNER_OS"
          echo "Workflow triggered by: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit SHA: ${{ github.sha }}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: "${{ matrix.NXF_VER }}"

      - name: Install nf-test
        uses: nf-core/setup-nf-test@v1

      - name: Run nf-test
        run: nf-test test --ci

  # Test legacy pipeline (preserve original functionality)
  legacy-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pipeline code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: "latest-stable"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bowtie2 libgd-perl
          sudo cpan App::cpanminus
          sudo cpanm GD::Graph
             
      - name: Download test files
        run: |
          wget https://www.bioinformatics.babraham.ac.uk/projects/fastq_screen/fastq_screen_test_dataset.tar.gz
          tar xvzf fastq_screen_test_dataset.tar.gz
          ln -s fastq_screen_test_dataset/*.fastq.gz .
          $GITHUB_WORKSPACE/fastq_screen --get_genomes
        
      - name: Run FastQ Screen (classic)
        run: |
          $GITHUB_WORKSPACE/fastq_screen --conf ./FastQ_Screen_Genomes/fastq_screen.conf *.fastq.gz

      - name: Run Nextflow pipeline test
        run: |
          nextflow run . --input "fastq_screen_test_dataset/*.fastq.gz" --conf ./FastQ_Screen_Genomes/fastq_screen.conf --outdir ./results -profile docker
