# FastQ Screen Configuration File for Testing
# This configuration is designed for testing the Nextflow workflow

######################################
## Bowtie, Bowtie 2, BWA or minimap2 #
######################################
# Use system-installed versions by default
BOWTIE2 bowtie2
BWA bwa
MINIMAP2 minimap2

############
## Threads #
############
THREADS		4

##############
## DATABASES #
##############
# Note: These are placeholder paths - users should update with actual genome paths
# Or use --get_genomes to download standard genomes

# Human genome
DATABASE	Human	/path/to/Human/Homo_sapiens

# Mouse genome  
DATABASE	Mouse	/path/to/Mouse/Mus_musculus

# E. coli genome
DATABASE	Ecoli	/path/to/Ecoli/Ecoli

# PhiX control
DATABASE	PhiX	/path/to/PhiX/phi_plus_SNPs

# Common contaminants and adapters
DATABASE	Adapters	/path/to/Contaminants/Contaminants

# Vector sequences
DATABASE	Vectors	/path/to/Vectors/Vectors